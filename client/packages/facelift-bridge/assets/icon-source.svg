<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Vance app icon. Mark = mathematical italic small "v" (U+1D463)
       per the brand guideline in instructions/web-ui.md. The glyph is
       outlined from STIX Two Math so the SVG renders identically on
       every build host (no font-fallback risk). Solid background — iOS
       App Store rejects transparent icons. Re-run
       `pnpm assets:regenerate-png` + `pnpm assets:generate` to refresh
       the iOS Assets.xcassets after edits. -->
  <rect width="1024" height="1024" fill="#1e3a8a"/>
  <path fill="#ffffff"
        transform="matrix(1.720655737704918 0 0 -1.720655737704918 54.305573770491776 916.3540983606558)"
        d="M200 476 53 465V437C53 437 83 440 99 440C117 440 123 426 123 409C123 389 116 365 113 354L93 278C82 236 71 183 71 135C71 58 100 -9 200 -9C380 -9 479 206 479 358C479 429 448 479 403 479C382 479 365 464 365 437C365 393 426 369 426 299C426 206 368 55 231 55C170 55 153 99 153 151C153 196 166 249 175 284L222 476Z"/>
</svg>
