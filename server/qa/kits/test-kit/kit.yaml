name: test-kit
description: |
  Static fixture for the qa/ai-test KitImportTest — exercises the kit
  import path with one document, two settings (one STRING, one PASSWORD
  encrypted via the vault), and one tool. Re-used by the test as a
  source template; the test copies this tree into a per-run scratch
  directory and rewrites settings/api_token.yaml with a freshly
  vault-encrypted ciphertext before pointing the brain at it.
version: "1.0"
hasEncryptedSecrets: true
