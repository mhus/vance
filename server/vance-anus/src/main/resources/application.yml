spring:
  application:
    name: vance-anus
  mongodb:
    uri: ${VANCE_MONGODB_URI:mongodb://root:example@localhost:27017/vance?authSource=admin}
    database: ${VANCE_MONGODB_DATABASE:vance}
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
  shell:
    interactive:
      enabled: true
    script:
      enabled: false
    history:
      enabled: true
      name: ${user.home}/.vance-anus-history

vance:
  encryption:
    # Anus shares the same key store as Brain. No insecure default — a
    # missing VANCE_ENCRYPTION_PASSWORD must fail the boot (F4).
    password: ${VANCE_ENCRYPTION_PASSWORD}
  anus:
    access:
      # BCrypt hash of the login password. Required at boot — no default.
      # Generate with: java -jar vance-anus.jar hash --plain <password>
      password-hash: ${VANCE_ANUS_PASSWORD_HASH:}
      # Sliding-window timeout. Each authorised command resets the clock.
      timeout: 10m
    dev-mode:
      # LOCAL DEBUGGING ONLY. When true, exposes 'setting show-password'
      # which prints decrypted PASSWORD plaintext to stdout. Refuses to
      # start when a 'prod' / 'production' Spring profile is also active.
      enabled: ${VANCE_ANUS_DEV_MODE:false}
  audit:
    # Delivery mode after @PostConstruct (SYNC before that). Anus runs
    # short interactive shells, so SYNC is the safer default: no worker
    # thread, no on-exit drain wait, every command's audit trail is
    # flushed before the next prompt.
    mode: sync
    queueSize: 10000
    drainTimeoutMs: 5000
    consumers:
      log:
        enabled: false

logging:
  level:
    root: WARN
    de.mhus.vance: INFO
    org.springframework.data.mongodb: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
