server:
  port: 9992

# Sibling of application-primary.yml — second brain instance on the same
# host that joins the same Redis bus, so the two brains see each other's
# document-presence membership deltas (and future documents.changed
# events).
vance:
  encryption:
    # Local IDE/dev default so this profile boots without setting
    # VANCE_ENCRYPTION_PASSWORD. Deliberately NOT "changeit" (the service
    # rejects that publicly-known key); production application.yml carries
    # no default and fails fast if the env var is unset (code-review F4).
    password: ${VANCE_ENCRYPTION_PASSWORD:vance-local-dev}
  redis:
    enabled: true
    host: localhost
    port: 6379

logging:
  file:
    name: vance-brain2.log
  level:
    de.mhus.vance: TRACE
