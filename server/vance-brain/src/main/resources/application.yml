spring:
  application:
    name: vance-brain
  mongodb: # since spring 7: spring.mongodb.*
    uri: mongodb://root:example@localhost:27017/vance?authSource=admin
    database: vance
  data:
    mongodb:
      # Make Spring Data MongoDB honour @Indexed / @CompoundIndex /
      # @TextIndexed annotations on entity classes. Without this flag,
      # the annotations are dead decoration and the only index on every
      # collection is _id — search queries against the @TextIndexed
      # fields (session-search, etc.) fail with IndexNotFound, and
      # hot-path lookups by tenantId+sessionId run as collection scans.
      auto-index-creation: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    # Jackson 3 (Spring Boot 4) flips FAIL_ON_NULL_FOR_PRIMITIVES on by
    # default — Jackson 2 had it off. Several DTOs (e.g. AccessTokenRequest
    # with its boolean primitives) were written under the Jackson-2
    # assumption and JSON bodies sending {"requestRefreshToken": null}
    # now trigger HTTP 400. Restoring the previous default keeps
    # existing clients working.
    deserialization:
      fail-on-null-for-primitives: false

server:
  port: 9990
  error:
    # Include the exception message in the JSON error response so the
    # Web-UI (and curl) can show a useful message instead of the bare
    # "Bad Request". Spring's default `never` keeps it out, which makes
    # 400-class errors from `ResponseStatusException` (e.g. Setting-Form
    # validation, scope-resolution failures) opaque on the client.
    # Stacktraces stay off — internal exception types stay internal.
    include-message: always

vance:
  bootstrap:
    # Seed the Acme demo tenant on first start (users, project groups,
    # projects, demo documents, _vance system project, init-settings
    # YAML import). Set to false for production deployments.
    acme: true
  ws:
    path: /brain/*/ws
  storage:
    chunk-size: 524288            # 512 KB
    cleanup-interval-ms: 900000   # 15 min
  services:
    storage-cleanup: true         # this brain instance runs the cleanup
    magrathea: true                  # workflow subsystem (planning/workflow-service.md)
    serverVersion: 0.1.0
    protocolVersion: 1
    pingIntervalSeconds: 30
    capabilities: []
  encryption:
    password: ${VANCE_ENCRYPTION_PASSWORD:changeit}
  web:
    # Browser-reachable base URL for callbacks (e.g. OAuth redirect_uri).
    # Dev default = Vite dev server (proxies /brain/* to this Spring app).
    # In prod, override with the reverse-proxy hostname:
    #   VANCE_WEB_PUBLICBASEURL=https://vance.example.com
    publicBaseUrl: ${VANCE_WEB_PUBLICBASEURL:http://localhost:9900}
  internal:
    # Shared secret used by Layer 1 to authenticate against /internal/**
    # endpoints on a peer pod. In K8s this is mounted from a Secret; the
    # default keeps single-pod dev workable. NEVER expose Layer 2 outside
    # the cluster.
    token: ${VANCE_INTERNAL_TOKEN:changeit-internal}
  workspace:
    access:
      bypass-proxy: false
      max-file-size: 10485760       # 10 MiB
      cache-ttl: 30m
      connect-timeout: 2s
      read-timeout: 30s
  ai:
    cache:
      # Master switch for Anthropic prompt caching. When false, the
      # AnthropicProvider downgrades every AiChatOptions.cacheBoundary
      # to NONE — every call pays full input price, no cache_control
      # markers go out. Per-recipe override via params.disableCache:true
      # is layered on top (engine-level granularity); set this flag
      # to false for an operator-level kill switch.
      enabled: true
  autoSummary:
    # Per-pod scheduler that runs Jeltz over dirty documents — see
    # planning/auto-summary.md. Feature default is on; opt-out is the
    # per-project `autoSummary.enabled` cascade setting.
    intervalMs: 300000          # 5 min between ticks
    initialDelayMs: 60000       # 1 min after pod start before first tick
    batchSize: 10               # max documents claimed per project per tick
    claimTtlMinutes: 10         # stale-claim recovery window
    maxContentBytes: 200000     # prompt-content cap (head + tail truncation)
  documents:
    archive:
      # Document versioning — DocumentService archives the previous
      # version of a document before overwriting it. Cascade:
      # operator switch here → per-project `documents.archive.enabled`
      # cascade setting (default true).
      enabled: true
      # Minimum seconds between two archive entries for the same
      # document. Saves within this window are collapsed onto the
      # previous version — keeps edit-bursts from producing dozens of
      # near-identical archives. Per-project override via the cascade
      # setting `documents.archive.minVersionIntervalSeconds`.
      minVersionIntervalSeconds: 600   # 10 min
  audit:
    # Delivery mode after @PostConstruct. Before @PostConstruct the
    # service is always SYNC so events emitted during Spring wiring
    # are not lost. `async` decouples producers from consumer cost via
    # a bounded queue; `sync` dispatches inline on the caller thread.
    mode: async
    queueSize: 10000        # bounded — drops + counter when full
    drainTimeoutMs: 5000    # @PreDestroy waits this long for the worker
    consumers:
      log:
        # Activates LogAuditConsumer (every event as SLF4J INFO).
        # Opt-in; keep off in production until the action vocabulary
        # is stable, otherwise log volume balloons.
        enabled: false
  scheduler:
    log:
      # System-wide fallback for the per-run log document retention.
      # Tenant operators override this via the typed setting
      # `scheduler.log.retentionDays` (project cascade: project →
      # _tenant → this default). Reaped by MongoDB's TTL monitor —
      # see DocumentDocument.expiresAt and SchedulerLogService.
      #
      # Tri-state:
      #   > 0  — actual retention in days (clamped to <= 365).
      #   0    — INFINITE: document is written but expiresAt is left
      #          null, so Mongo's TTL monitor never reaps it.
      #   < 0  — DISABLED: no document is written at all.
      retention-days: 7
  events:
    log:
      # Same tri-state semantics as scheduler.log — system-wide fallback
      # retention for the per-trigger log document under
      # _vance/logs/events/<name>/<isoStamp>-<correlationId>.md.
      # Tenant override: setting `events.log.retentionDays` (project
      # cascade).
      #
      #   > 0  — actual retention in days (clamped to <= 365).
      #   0    — INFINITE retention (no TTL set).
      #   < 0  — DISABLED (no document written).
      retention-days: 7
  web:
    search:
      log:
        # Per-call log document for web_search invocations under
        # _vance/logs/web/search/<isoStamp>-<correlationId>.md.
        # Captures the query + hit list the LLM actually saw — failed
        # calls are NOT logged (errors are visible to the engine in
        # the tool response).
        # Tenant override: setting `web.search.log.retentionDays`
        # (project cascade). Same tri-state semantics:
        #   > 0  — retention in days (<= 365).
        #   0    — INFINITE (no TTL).
        #   < 0  — DISABLED.
        retention-days: 7
    fetch:
      log:
        # Per-call log document for web_fetch invocations under
        # _vance/logs/web/fetch/<isoStamp>-<correlationId>.md.
        # Captures the truncated body the LLM saw, not the full
        # upstream response. Failed fetches (ToolException) are NOT
        # logged. Tri-state semantics as above; tenant override via
        # `web.fetch.log.retentionDays`.
        retention-days: 7
  prak:
    # Side-channel an: Compaction → Prak-Analyzer → Sanitizer → Strength → Promotion → Audit
    sideChannelEnabled: true
    # Strength-Tags beim LLM-Replay anwenden (dropt STRENGTH:weak Messages)
    contextFilterEnabled: true
    # Schwelle: WEAK=alles behalten, NORMAL=WEAK dropen (default),
    # STRONG=alles unter STRONG dropen
    contextFilterMinStrength: NORMAL

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
    # Each endpoint needs both exposure AND access in Spring Boot 4 —
    # @ConditionalOnAvailableEndpoint checks both. Default access is
    # NONE (no public read), so we open prometheus explicitly.
    prometheus:
      access: unrestricted
  endpoints:
    access:
      default: unrestricted
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
  metrics:
    tags:
      # Pin every metric with the application name so Prometheus /
      # Grafana queries can scope to vance-brain without colliding
      # with other services that share the cluster's Prometheus
      # (Nimbus pods etc.).
      application: vance-brain
  # Spring Boot 4 split metrics-export out of the actuator default
  # auto-config: PrometheusMetricsExportAutoConfiguration is gated by
  # @ConditionalOnEnabledMetricsExport, which looks at
  # `management.<id>.metrics.export.enabled` (id=prometheus here). The
  # registry+endpoint stay 404 unless we flip it on. See
  # spring-boot-micrometer-metrics-4.0.6/.../OnMetricsExportEnabledCondition.class.
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  file:
    name: vance-brain.log
  level:
    de.mhus.vance: TRACE
