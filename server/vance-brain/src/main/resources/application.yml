spring:
  application:
    name: vance-brain
  mongodb: # since spring 7: spring.mongodb.*
    uri: mongodb://root:example@localhost:27017/vance?authSource=admin
    database: vance
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

vance:
  ws:
    path: /brain/*/ws
  storage:
    chunk-size: 524288            # 512 KB
    cleanup-interval-ms: 900000   # 15 min
  services:
    storage-cleanup: true         # this brain instance runs the cleanup
    serverVersion: 0.1.0
    protocolVersion: 1
    pingIntervalSeconds: 30
    capabilities: []
  encryption:
    password: ${VANCE_ENCRYPTION_PASSWORD:changeit}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: vance-brain.log
  level:
    de.mhus.vance: TRACE
