# Token-window metadata for known AI models. Used by ModelCatalog to
# decide when to compact a chat (default trigger: 90% of contextWindow,
# see vance.ford.compactionTriggerRatio), to size the request's
# max-output-tokens, and to gate multimodal attachments.
#
# Bundled defaults — overridable per tenant (document path
# ai-models.yaml in the _vance system project) or per project (same
# path in the project itself). Cascade matches recipes: project →
# _vance → this classpath file. Merge is deep, per <provider>:<modelName>:
# an override only needs to carry the fields it changes; fields not
# listed inherit from the next outer layer. Lists (capabilities) are
# replaced, not concatenated.
#
# Format:
#   <provider>:
#     <modelName>:
#       contextWindowTokens: <int>     # combined input + output budget
#       defaultMaxOutputTokens: <int>  # cap on a single response
#       size: SMALL|LARGE              # capability class — drives
#                                      # prompt-variant selection in recipes
#       timeoutSeconds: <int>          # per-call HTTP timeout. Optional;
#                                      # defaults to 60s when absent. Bump
#                                      # for slow reasoning models, local
#                                      # LLMs, or models known to throttle
#                                      # under load.
#       capabilities: [vision, pdf, thinking]
#                                      # optional input/feature modalities.
#                                      # Known values:
#                                      #   vision   — accepts image blocks
#                                      #   pdf      — accepts PDF blocks
#                                      #              natively (else PDFBox
#                                      #              text-extract fallback)
#                                      #   thinking — accepts an explicit
#                                      #              reasoning/extended-
#                                      #              thinking control. When
#                                      #              absent, the provider
#                                      #              downgrades recipe-
#                                      #              level thinking to off
#                                      #              rather than letting
#                                      #              the API 400 the call.
#                                      # Absent / unknown models are treated
#                                      # as text-only with no thinking
#                                      # (pessimistic defaults).
#       actionLoopCorrections: <int>   # Pacemaker for the structured-action
#                                      # loop. When the LLM emits free text
#                                      # without calling the engine's action
#                                      # tool, the loop re-prompts up to this
#                                      # many times before falling back to
#                                      # bestFreeText. Optional; defaults to
#                                      # 2 when absent. Bump for models that
#                                      # occasionally return empty STOP
#                                      # after long tool-call chains
#                                      # (gemini-2.5-pro is the known case
#                                      # — see plan-mode.md §14a).
#
# Adjust freely; this file is committed (no secrets here).

anthropic:
  claude-sonnet-4-5:
    contextWindowTokens: 200000
    defaultMaxOutputTokens: 8192
    size: LARGE
    capabilities: [vision, pdf, thinking]
  claude-opus-4:
    contextWindowTokens: 200000
    defaultMaxOutputTokens: 8192
    size: LARGE
    capabilities: [vision, pdf, thinking]
  # Haiku doesn't expose extended-thinking — keep vision/pdf only so
  # the provider's THINKING-gate downgrades recipe-level thinking to
  # OFF for haiku rather than letting the API reject the request.
  claude-haiku-4-5:
    contextWindowTokens: 200000
    defaultMaxOutputTokens: 8192
    size: SMALL
    capabilities: [vision, pdf]

# Gemini 2.5's `thinkingConfig.thinkingLevel` (the field langchain4j
# 1.14.1's `GoogleAiGeminiChatModel#thinkingConfig(...)` sets) is
# currently 400-rejected by Google's API ("Thinking level is not
# supported for this model"). Until langchain4j moves to the new
# `thinkingBudget`-token API we deliberately do NOT advertise THINKING
# on Gemini models — the provider's gate then drops recipe-level
# thinking before it reaches the SDK. Re-add once empirically verified.
gemini:
  gemini-2.5-flash:
    contextWindowTokens: 1048576
    defaultMaxOutputTokens: 8192
    size: SMALL
    capabilities: [vision, pdf]
    timeoutSeconds: 45
  gemini-2.5-pro:
    contextWindowTokens: 2097152
    defaultMaxOutputTokens: 8192
    size: LARGE
    capabilities: [vision, pdf]
    # Pro under reasoning load + long contexts genuinely takes 60-90s
    # per call; 60s default truncated mid-stream too often in 2026Q2.
    timeoutSeconds: 120
    # Heartbeat / pacemaker — Pro occasionally returns an empty STOP
    # after long tool-call chains (Plan-Mode execution especially —
    # web_search × N, doc_create_text × N, then silence). Global
    # default is 2 corrections before the action-loop falls back to
    # the best free-text seen; Pro needs more head-room.
    actionLoopCorrections: 4
  gemini-2.0-flash:
    contextWindowTokens: 1048576
    defaultMaxOutputTokens: 8192
    size: SMALL
    # 2.0-flash predates Gemini's PDF document mode; vision works.
    capabilities: [vision]

