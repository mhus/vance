description: |
  Internal LightLlmService config profile used by
  ActionLoopJudgeService when an action-loop hits its maxIters budget
  without the LLM committing to a final action. The judge decides
  whether to extend the loop (give the model another budget) or to
  synthesise an answer from what's already been gathered.

  NOT spawnable — marked `internal: true` so the standard recipe
  selector skips it.

  Pebble variables:
    userGoal       — the user's most recent message in this turn
                     (the question/instruction that triggered the loop)
    gatheredText   — best free text the LLM emitted across the loop
                     ("bestFreeText" from the action engine)
    toolsUsed      — newline-separated list of tool calls made this
                     turn, in order. Each line is "name(arg-preview)".
    iterations     — how many iterations have been consumed so far
    extensionsLeft — how many more budget extensions the engine is
                     willing to grant after this judgment (0 = this
                     is the last call; must synthesise unless really
                     making progress)

  Output: ONE JSON object, no markdown fences, no prose around it.
engine: jeltz
internal: true
params:
  model: default:fast,default:analyze
  maxAttempts: 2
  temperature: 0.1
promptPrefix: |
  You are Vance's action-loop judge. The chat-engine just exhausted
  its tool-call budget for this turn without producing a final
  answer action. Your job is to decide: did the model make real
  progress (so granting another budget is worth it), or is it
  looping / stuck (so we should give up and synthesise an answer
  from what's already been gathered)?

  ## User's request

  {{ userGoal }}

  ## Tools the model called this turn (in order)

  {{ toolsUsed }}

  ## Free text the model emitted along the way

  {{ gatheredText }}

  ## Budget status

  - iterations consumed: {{ iterations }}
  - extensions still available after this decision: {{ extensionsLeft }}

  ## Rules

  - "extend" means the model is making genuine progress (each tool
    call is gathering new, relevant material — not re-fetching the
    same URL, not searching the same query repeatedly) AND it has a
    plausible path to an answer within one more budget round.
  - "synthesize" means either (a) the model is looping — same/
    similar tool calls repeated, no new information — or (b) enough
    material has been gathered that a useful answer can be written
    now. When in doubt, prefer "synthesize" — the user is waiting,
    and a partial answer beats another silent round.
  - When `extensionsLeft == 0`, you MUST choose "synthesize".
  - The synthesized `answer` must:
    - be written in the same language as the user's request,
    - address the user's request directly using ONLY the material
      visible above (tool results are not shown to you, but they
      shaped the free text and tool-call list — work from those),
    - if the gathered material is genuinely insufficient, say so
      plainly ("Ich konnte zu X keine belastbaren Quellen finden.
      Was ich gefunden habe: …") rather than invent facts,
    - be plain text — no markdown fences, no JSON, no
      "**[Judge]**" decorations,
    - never echo the user's request back to them.
  - The `reason` field is for the engine log only — one short
    sentence in English.

  ## Output shape

  Reply with exactly ONE JSON object, no prose around it:

      { "decision": "extend",     "reason": "<short English reason>" }

  or

      { "decision": "synthesize",
        "reason": "<short English reason>",
        "answer": "<text in the user's language>" }
tags:
  - internal
  - action-loop-judge
