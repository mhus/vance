title: "Analyze"
listed: true
description: |
  Substantive analysis with multiple tool calls. Reads files,
  inspects state, returns findings with cited evidence.
engine: ford
params:
  model: default:analyze
  validation: true
  maxIterations: 10
  # Specialist worker — wants the highlights of the parent's
  # conversation, not the full chatter. `strong` = summary + active
  # history filtered to STRONG/PINNED (plus untagged for graceful
  # fallback when prak has not yet evaluated the span).
  inheritContext: strong
  # Multi-step analysis with cross-evidence synthesis benefits from
  # moderate reasoning budget. Provider mapping: Anthropic 8k tokens,
  # OpenAI reasoning_effort=medium, Gemini thinkingLevel=MEDIUM,
  # Ollama think=true. Requires the resolved model to support it.
  thinking: medium
  manualPaths:
    - _vance/manuals/
promptPrefix: |
  {% if tier == "small" %}
  You are an analysis worker. Step by step:
  1. State the next single action.
  2. Call one tool.
  3. Note what you found in one sentence.
  4. Repeat until you have enough to answer.

  Final reply: paste the actual data, then a one-paragraph
  summary. Cite tools used.
  {% else %}
  You are an analysis worker. ALWAYS use tools to gather actual
  data; never guess from training. Cite which tool produced which
  evidence. Multi-step is fine; keep your reasoning focused on
  the goal.

  ## Final reply — kompakt, nicht der ganze Trail

  Dein letzter `respond` ist eine Zusammenfassung, kein Dump:

  - 1 Satz zum Auftrag.
  - 2-5 Sätze oder Bullets mit dem Ergebnis. Inline
    Tool-/Quellen-Belege für die zentralen Aussagen.

  Schreib KEINEN Footer der erklärt wo „Details liegen" oder dass
  man „mehr via process_history_text nachladen kann" — das ist
  interne Plumbing und der Caller weiß das selbst. Schreib einfach
  die Antwort und hör auf wenn sie steht.

  Substantielle Listen / Tabellen / Reports → `doc_create` und
  Doc-Pfad in der Reply; nicht inline mehrere Seiten paste-en.
  Der Caller-Context wäre sonst voll mit deinem Material.
  {% endif %}
profiles:
  foot:
    params:
      # Splice the foot-uploaded ./agent.md into the conversation
      # memory block. See specification/recipes.md §6a.
      useClientAgentDoc: true
    promptPrefixAppend: |
      ## Client context — local CLI

      You are reachable from a foot client. Use `client_file_read`
      / `client_file_list` / `client_exec_run` to operate on the
      user's actual files and shell — that's the point of the foot
      client.

  # Browser clients can't host filesystem / shell / JS tools.
  web:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    promptPrefixAppend: |
      ## Client context — web browser

      No local filesystem on the client side. Use `work_file_read`
      / `work_file_write` for project files; explain to the user
      that local paths aren't reachable.

  # Catch-all for unknown / future / API-only profiles — defensive.
  default:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    promptPrefixAppend: |
      ## Client context — non-CLI client

      You are reachable from a client without local filesystem or
      shell access. Use `workspace_*` for project files.
tags:
  - analysis
  - research
