# Reactive session-chat orchestrator. Talks to the user, delegates
# operational work to worker recipes, synthesises worker results back
# into the chat. Default for engine 'arthur' when no specific recipe
# is named.

description: |
  Reactive session-chat orchestrator. Talks to the user, delegates
  operational work to worker recipes, synthesises worker results
  back into the chat. Default for engine 'arthur' when no specific
  recipe is named.
engine: arthur
params:
  model: default:analyze
  validation: true
  maxIterations: 6
  # Auto-inject the project's default RAG into Arthur's turns —
  # project documents (specs, notes, prior research) get chunked by
  # the auto-indexer and surface as context in every turn that
  # mentions them. Cascade-overridable per tenant/project via the
  # rag.autoInject.enabled setting; tune minScore / topK if
  # irrelevant chunks bleed in or turns get too long.
  rag:
    autoInject: true
    minScore: 0.65
    topK: 5
  # If the primary alias hits a demand spike or 5xx and exhausts its
  # retry budget, the resilient layer falls through these in order.
  # Aliases that the tenant hasn't configured are silently dropped.
  fallbackModels:
    - default:fast
  # Folder list joined by manual_list / manual_read. Resolved through
  # the document cascade per folder — tenants can drop additional
  # how-tos into <project>/manuals/ or _vance/manuals/ without touching this
  # recipe. Recipe order = precedence on duplicate filenames.
  manualPaths:
    - manuals/
  # Default prompt lives in the document cascade — the Arthur engine
  # loads prompts/arthur-prompt.md (project → _vance → classpath:
  # vance-defaults/prompts/) as the engineDefault. The file is a
  # Pebble template: tier/mode variants live inside via
  # {% if tier == "small" %}…{% endif %}. Tenants override by placing
  # the file at the matching path in their _vance project (or per-user
  # in _user_<login>). Plan-mode-specific prompts still use suffix
  # files: -exploring.md, -planning.md, -executing.md.
  #
  # Recipes that want a different prompt either set promptPrefix
  # directly here (highest precedence) or point promptDocument at a
  # different cascade path.
# Engine base is empty (unrestricted) — the recipe is now the single
# source of truth for what Arthur sees. See ArthurEngine.ALLOWED_TOOLS
# javadoc and planning/tool-schema-deferral.md §14.6.
#
# RecipeResolver.toolFilterFor uses first-match-wins through the
# profile/mode cascade — there is no accumulation. That's why the
# destructive bulk-ops we never want Arthur to call directly are
# repeated in every mode block below. (The alternative would be a
# top-level allowedToolsRemove which gets skipped whenever any mode
# block matches.) See RecipeResolver.lookupModeBlock.
#
# Strategy per mode:
#   NORMAL    — Arthur is a chat orchestrator. Read-only stays primary
#               (schema in manifest); @write / @executive / @side-effect
#               move to the deferred discovery block. The LLM sees them
#               by name and can call them directly via auto-activate.
#   EXPLORING — read-only only; writes/executive/side-effects are
#               physically removed from dispatch.
#   PLANNING  — same as EXPLORING.
#   EXECUTING — falls through to engine default (no overlay, full pool).
#
# Destructive ops Arthur never invokes directly. Doc-deletion,
# RAG/kit lifecycle, workspace wipes — these need explicit user
# direction, so they live behind DELEGATE (worker spawns explicitly).
# Kept as a shared anchor + YAML merge so we don't drift between modes.
_destructive_excludes: &destructive_excludes
  - doc_purge
  - doc_delete
  - doc_restore
  - rag_create
  - rag_delete
  - kit_apply
  - kit_install
  - kit_update
  - kit_export
  - scratch_delete
  - peer_notify
  - git_checkout

modes:
  NORMAL:
    allowedToolsRemove: *destructive_excludes
    # process_create is @executive (defer below) but Arthur needs
    # it primary so he can spawn Slartibartfast directly when a
    # task fits the plan-then-execute pattern. Without this Arthur
    # falls back to spawning Marvin workers via tool-name resolution,
    # which historically stalls on substantial creative tasks.
    allowedToolsAdd:
      - process_create
    allowedToolsDefer:
      - "@write"
      - "@executive"
      - "@side-effect"
  EXPLORING:
    allowedToolsRemove:
      - "@write"
      - "@executive"
      - "@side-effect"
      - respond
  PLANNING:
    allowedToolsRemove:
      - "@write"
      - "@executive"
      - "@side-effect"
      - respond
profiles:
  # The foot CLI is the user's terminal on their own machine — local
  # files, shell, and JS run there. Reach them through client_*.
  foot:
    params:
      # Splice the foot-uploaded ./agent.md into the conversation
      # memory block (in addition to the server-side agent doc).
      # See specification/recipes.md §6a.
      useClientAgentDoc: true
    # Lifecycle for foot sessions — same shape as web/mobile now:
    # disconnect keeps the session running so an unrelated worker can
    # finish (research/LLM-call without local tools), idle eventually
    # parks it. Calls to client-only tools while the foot WS is gone
    # surface as engine-side errors and let the engine decide how to
    # recover. Idle window is generous (1h) so the user can step away
    # mid-conversation without losing context. See
    # specification/session-lifecycle.md §5 + §7.
    session:
      onDisconnect: KEEP_OPEN
      onIdle: SUSPEND
      onSuspend: KEEP
      idleTimeoutMs: 3600000            # 1h
      suspendKeepDurationMs: 86400000   # 24h
    promptPrefixAppend: |
      ## Client context — local CLI

      You are reachable from a foot client — the user's CLI on their
      own machine. The user is editing files locally; reach them
      through `client_file_read` / `client_file_list` /
      `client_file_write` / `client_exec_run`. That is the point of
      the foot client. Do not push the user to upload local files
      into the project workspace when they're already on disk.

  # Browser clients can't host filesystem / shell / JS tools — strip
  # them from the allowed list so the LLM doesn't propose calls that
  # would always fail. See specification/recipes.md §6a.
  web:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    # Lifecycle for web sessions — server tools are enough, so the
    # session keeps running across disconnects; idle eventually parks
    # it. See specification/session-lifecycle.md §5.
    session:
      onDisconnect: KEEP_OPEN
      onIdle: SUSPEND
      onSuspend: KEEP
      idleTimeoutMs: 1800000            # 30 min
      suspendKeepDurationMs: 86400000   # 24h
    promptPrefixAppend: |
      ## Client context — web browser

      You are reachable from a web browser — there is no local
      filesystem on the client side. Use `scratch_read` /
      `scratch_write` for files stored in the project. If the user
      references local files (`~/Documents/foo.md`, paths on their
      machine), explain that you can't reach them from a web client
      and offer alternatives: upload to the workspace, or reconnect
      via `vance` CLI.

  # Catch-all for unknown / future / API-only profiles. Same
  # restrictions as web — no client_* — until the new profile gets
  # an explicit block of its own.
  default:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    session:
      onDisconnect: KEEP_OPEN
      onIdle: SUSPEND
      onSuspend: KEEP
      idleTimeoutMs: 1800000
      suspendKeepDurationMs: 86400000
    promptPrefixAppend: |
      ## Client context — non-CLI client

      You are reachable from a client without local filesystem or
      shell access. Use `workspace_*` tools for project files; do not
      promise `client_*` operations.
tags:
  - chat
  - orchestrator
  - engine-default
