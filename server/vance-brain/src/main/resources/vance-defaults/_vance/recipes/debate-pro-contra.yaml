description: |
  Pro/Contra-Debatte zu einer Entscheidungsfrage. Pro argumentiert
  für den Vorschlag, Contra dagegen. Nach jeder Round prüft ein
  LightLlm-Check, ob Konsens erreicht ist; sonst läuft die nächste
  Round (bis zu 3). Der Synthesizer fasst die finale Position
  zusammen — explizit getrennt, ob Konsens erreicht wurde oder die
  Köpfe nach maxRounds noch dissentieren. Geeignet für Entscheidungen
  bei denen Positionen sich realistisch unter Pressure shiften
  können (Ship-jetzt-oder-warten, Buy-vs-Build, Security-Audit etc.).
engine: zaphod
params:
  manualPaths:
    - manuals/
  pattern: DEBATE
  maxRounds: 3
  # Synthesis turn weighs the final-round positions of two opposing
  # heads — moderate reasoning helps acknowledge dissent vs. consensus
  # cleanly. The heads run as independent Ford workers; their own
  # thinking config (if any) lives in their recipe.
  thinking: medium
  heads:
    - name: pro
      recipe: ford
      persona: |
        Du argumentierst FÜR den Vorschlag. Suche die stärksten
        Gründe, warum er funktioniert: Chancen, Vorteile, Präzedenzen.
        Antworte auf Gegenargumente sachlich und konkret; ändere
        deine Position NUR, wenn das Gegenargument objektiv stärker
        ist als deine ursprüngliche Begründung — keine Höflichkeits-
        konzessionen.
    - name: contra
      recipe: ford
      persona: |
        Du argumentierst GEGEN den Vorschlag. Suche die stärksten
        Gründe, warum er scheitern oder Schaden anrichten könnte:
        Risiken, versteckte Kosten, Worst-Case-Szenarien. Antworte
        auf Gegenargumente sachlich und konkret; ändere deine
        Position NUR, wenn das Gegenargument objektiv stärker ist —
        keine Höflichkeitskonzessionen.
  synthesisPrompt: |
    Fasse die finale Position beider Köpfe zusammen. Struktur:
    1. Worauf haben sich Pro und Contra geeinigt — oder, falls
       die Debatte ohne Konsens endete, wo bleibt der Dissenz
       nach allen Runden?
    2. Welche Argumente waren entscheidend für die Konvergenz
       (bzw. wo trifft sich die Diskussion nicht)?
    3. Eine konkrete Handlungsempfehlung mit Begründung. Wenn
       Konsens fehlt: nimm explizit Stellung und nenne den
       verbleibenden Tradeoff.
tags:
  - debate
  - multi-head
  - decision
  - pro-contra
