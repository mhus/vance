# Generalist worker fallback — used when a process is spawned without
# recipe AND without engine. Conservative defaults: ford with a basic
# 'helpful assistant' prompt and validation on.
#
# Recipe `name` is derived from the filename (default.yaml → default).
# Cascade: project/recipes/<name>.yaml → _vance/recipes/<name>.yaml →
# classpath vance-defaults/recipes/<name>.yaml. See specification/recipes.md.

description: |
  Generalist worker fallback — used when a process is spawned
  without recipe AND without engine. Conservative defaults: ford
  with a basic 'helpful assistant' prompt and validation on.
engine: ford
params:
  model: default:analyze
  validation: true
  # Generalist authoring tasks are multi-step (create data doc + script +
  # multi-block workpage, with the occasional discovery / retry). 8 was too
  # tight — a page build routinely burned the budget mid-task. See
  # planning/worker-spawn-context.md.
  maxIterations: 20
  manualPaths:
    - _vance/manuals/
  # Selector-routed fallback recipe — used for Arthur's DELEGATE
  # without preset. Worker needs the parent's conversation as
  # background (same rationale as `ford.yaml`). See
  # planning/worker-spawn-context.md.
  inheritContext: all
promptPrefix: |
  You are a generalist Vance worker.
  {% if tier == "small" %}
  For each step:
    1. State the next concrete action in one sentence.
    2. Call exactly one tool.
    3. Paste the relevant tool output into your reply.
  Never make up data; if a tool isn't available, say so.
  {% else %}
  Use the tools available to gather concrete data before answering.
  When a tool returns useful content (file lists, file bodies, command
  output, search hits), paste the relevant parts into your reply text —
  the caller can only read what you write, not the tool channel.
  Do not invent content from training data; if the right tool isn't
  available, say so plainly.

  When your reply contains a substantial artifact (multi-section
  report, structured findings, a comparison table, generated content
  longer than ~30 lines), save it as a Document via
  `doc_create` first and put the returned `markdownLink` in
  your reply instead of pasting the full body. Short fenced kinds
  (` ```mindmap`, ` ```list`, ` ```records`) are fine for small
  visuals inline.
  {% endif %}
dataRelayCorrection: |
  VALIDATION CHECK: this turn's tools returned %d characters of
  data, but your reply has only %d. The caller cannot see tool
  results — only your reply text. Re-issue the reply with the
  actual data pasted in.
# Ford's engine baseline is read/research/exec-oriented and keeps
# mutating doc/app tools opt-in per recipe. As the generalist DELEGATE
# fallback, `default` is expected to actually author content (the
# prompt above tells the worker to "save it as a Document via
# doc_create") and to build the workspace pages / apps a user asks
# for. Without these the worker finds the tools via find_tools but
# every call hard-fails "not available to this engine" (observed
# 2026-07-01: a delegated worker looped on workpage_create / doc_create
# and then hallucinated success). Entry-points stay visible; the
# block-level workpage family is deferred (discoverable + auto-activated)
# to keep the manifest lean.
allowedToolsAdd:
  - doc_create
  - doc_write
  - doc_edit
  - doc_append
  - doc_trash
  - workpage_create
  - workbook_app_create
  - app_rebuild
allowedToolsDefer:
  - workpage_query
  - workpage_block_append
  - workpage_block_insert
  - workpage_block_update
  - workpage_block_move
  - workpage_block_delete
profiles:
  # The foot CLI is the user's terminal on their own machine. Lean
  # into client_* tools — that's the point of the foot client.
  foot:
    params:
      # Splice the foot-uploaded ./agent.md into the conversation
      # memory block. See specification/recipes.md §6a.
      useClientAgentDoc: true
    promptPrefixAppend: |
      ## Client context — local CLI

      You are reachable from a foot client. Prefer `client_file_read`
      / `client_file_list` / `client_file_write` / `client_exec_run`
      to operate on the user's actual files and shell. Don't push
      them to upload local files into the workspace when they're
      already on disk.

  # Browser clients can't host filesystem / shell / JS tools — strip
  # them from the allowed list so the LLM doesn't propose calls that
  # would always fail. See specification/recipes.md §6a.
  web:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    promptPrefixAppend: |
      ## Client context — web browser

      You are reachable from a web browser — there is no local
      filesystem on the client side. Use `work_file_read` /
      `work_file_write` for files stored in the project. If the user
      references local files, explain that you can't reach them from
      a web client.

  # Catch-all for unknown / future / API-only profiles. Defensive: no
  # client_* until the profile gets an explicit block of its own.
  default:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    promptPrefixAppend: |
      ## Client context — non-CLI client

      You are reachable from a client without local filesystem or
      shell access. Use `workspace_*` for project files; do not
      promise `client_*` operations.
tags:
  - default
  - generalist
