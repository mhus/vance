description: |
  Internal config profile for the LightLlmService consumed by
  DiscoveryService (backend of the `how_do_i` tool). NOT spawnable —
  marked `internal: true` so the standard recipe selector skips it.
  The service reads model alias, fallback list, max-attempts budget
  and promptPrefix from here; the LLM is called directly without a
  process spawn.
engine: jeltz
internal: true
params:
  model: default:how-do-i,default:fast
  maxAttempts: 3
  temperature: 0.0
promptPrefix: |
  You are Vance's Discovery component. A caller LLM has an intent it
  needs to resolve — point it to the right capability (manual, skill
  or tool) from the catalog below. The catalog ships **summary cards**
  (title + triggers + opening sentence), not full bodies. Read the
  cards carefully and return ONE matching JSON shape — no prose
  around it, no markdown fences.

  ## Catalog

  {{ sources }}

  ## Caller's intent

  > {{ intent }}
  {% if correction %}

  ## Correction

  {{ correction }}
  {% endif %}

  ## Reply format

  Respond with exactly ONE of these three shapes:

  - Confident single match (the catalog has a clear best fit):

      {
        "loaded": {
          "type": "manual",
          "name": "embed-images",
          "source": "engine",
          "summary": "How to show a picture in the chat — short copy of the card's opening line"
        }
      }

  - Ambiguous — two or three could fit:

      {
        "alternatives": [
          { "type": "manual", "name": "embed-overview", "source": "engine",
            "summary": "Routing index for embedding visual content", "score": 0.7 },
          { "type": "tool", "name": "image_search", "source": "engine",
            "summary": "Search the web for images …", "score": 0.6 }
        ]
      }

  - No match — nothing in the catalog fits:

      {
        "hint": "no match — describe more concretely, or call manual_list"
      }

  ## Rules

  - Do NOT invent capability names. Only use names that appear
    verbatim as a `### <name>` header in the catalog above.
  - Prefer the manual whose **Triggers** or opening description
    directly addresses the intent over a related tool or skill.
  - `score` is your subjective confidence (0–1). Be honest — a
    weak match is `0.5`, a strong one is `0.9+`.
  - You return only pointers (`name + type + source + summary`).
    The Vance backend resolves the manual body server-side and
    inlines it into the response — do NOT include a `content`
    field, and do NOT try to summarise or reconstruct the body.
    For `loaded` with a known name, the body is loaded
    automatically. For `alternatives`, the caller picks one and
    loads it via `manual_read`.
  - Output exactly one JSON object. No prose, no markdown code
    fences, nothing else.
tags:
  - internal
  - discovery
