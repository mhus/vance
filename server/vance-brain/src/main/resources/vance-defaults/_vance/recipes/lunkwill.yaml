# Lunkwill default — generic focused worker. Acts as a fallback when
# a process is spawned with engine=lunkwill without a more specific
# recipe (coding, lunkwill-repair, lunkwill-fook-upstream, …).
#
# Lunkwill itself is endless-by-design: no maxIterations cap. Stop
# conditions are hardcoded in the engine (natural stop, tool-terminate
# via _terminate key, external interrupt via STOPPED/SUSPENDED status,
# wallclock + idle-stuck safety nets).

description: |
  Generic Lunkwill worker — Pi-style loop, drains inbox, calls the LLM,
  executes tools, repeats until natural stop or tool-driven terminate.
  Specialise via coding / lunkwill-repair / lunkwill-fook-upstream.

engine: lunkwill

params:
  model: default:fast
  # Engine-intrinsic manuals first, global manuals as fallback.
  # Recipe-specific manuals (coding-*, repair-*, …) live in
  # lunkwill/manuals/ too — same folder, distinguishing prefix.
  manualPaths:
    - lunkwill/manuals/
    - manuals/

tags:
  - worker
  - engine-default
