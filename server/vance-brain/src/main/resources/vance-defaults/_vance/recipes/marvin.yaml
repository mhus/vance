description: |
  Marvin v2 — autonomous-worker deep-think engine. Every node is
  a marvin-worker that walks the 5-phase state-machine. The tree
  grows dynamically: nodes decide for themselves whether to call
  a specialist recipe, decompose into children, ask the user, or
  conclude. The Plan IS the Tree — every LLM call receives a live
  snapshot of the entire tree as context.

  Specialist recipes (web-research, analyze, code-read) are invoked
  via the CALL_RECIPE action and run in their native mode — Marvin
  does NOT layer the structured output contract on top of them.
engine: marvin
params:
  model: default:marvin,default:analyze
  # Tree-engine sees the parent's conversation highlights so it
  # builds its sub-task goals from what the USER actually mentioned,
  # not from training-data model names. `strong` filters by STRONG/
  # PINNED tags AND keeps untagged messages (OR-untagged semantic),
  # so in a young session where prak has not yet evaluated anything
  # Marvin sees the full active chat; in a mature session it sees
  # only the highlights. Avoids the failure mode where Marvin
  # decomposes from training cutoff and asks specialists for
  # outdated model names.
  inheritContext: strong
  # Specialist recipes available for CALL_RECIPE. The recipe
  # description above names the canonical three — keep them in the
  # default so Marvin actually has an outbound path. Empty list
  # would force every leaf into PROCEED_TO_CONCLUDE / NEEDS_SUBTASKS,
  # which collapses to training-data-only answers for any question
  # that needs fresh facts (the Vibecoding-Bug: 92 LLM calls, 0 tool
  # calls). Project-level overrides can still narrow this list.
  availableRecipes:
    # web-research: focused on external web (research_search,
    #   web_fetch, research_investigate). Use for "what's the latest
    #   X on the internet" — current models, news, public benchmarks.
    # analyze: full Ford toolbelt — RAG (rag_query, memory_search),
    #   documents (doc_read, doc_grep, doc_find), emails (gmail_*,
    #   zoho_imap__*), scratch / client files, calendars, Slack,
    #   Jira, Drive. The generalist for "look at material we have"
    #   tasks — own project data, mailbox, knowledge base.
    # code-read: read-only code inspection — file reads, ref chasing,
    #   structure summaries. Cheaper than analyze when scope is code.
    # quick-lookup: cheap one-shot — single tool call, short answer.
    #   For "what's the current date" / "does file X exist" style
    #   leaves so Marvin doesn't spawn a 10-iteration analyze for
    #   trivia.
    - web-research
    - analyze
    - code-read
    - quick-lookup
  # Hard cap on tree size before runaway protection kicks in.
  maxTreeNodes: 200
  # NEEDS_SUBTASKS-depth cap.
  maxTreeDepth: 5
  # Phase iteration bounds.
  reflectMaxIterations: 3
  validateMaxIterations: 2
  concludeMaxRetries: 2
  thinking: high
  manualPaths:
    - manuals/
tags:
  - deep-think
  - orchestrator
triggers:
  keywords:
    - marvin
    - deep think
    - deep-think
    - tiefgehend nachdenken
    - tiefes denken
    - decompose this
    - task tree
