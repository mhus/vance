# Trillian-Worker — task-bounded Frankie worker for Trillian-User.
#
# Spawned by Trillian-User via cross_process_create when a task needs
# doing in another project. Frankie-based (Pi-style loop, file_*/
# exec_*/doc_* tools), but with a hard termination contract:
# the worker MUST call trillian_done(summary=…) when finished, which
# fires DONE so the parent (Trillian-User) wakes and reports back to
# Control.
#
# Without the trillian_done convention, a Frankie natural-stop just
# parks the worker in IDLE and Trillian-User would wait forever for
# a terminal event.
#
# See planning/trillian-engine.md §9.

description: |
  Trillian-User worker. Frankie loop with a hard termination contract:
  call trillian_done(summary=…) when the task is finished so the
  parent gets a clean DONE event. Otherwise behaves like a coding-
  style worker (file_*/exec_*/doc_* via Frankie defaults).

engine: frankie

# trillian_done is the termination handshake. Plus a full document
# tool surface (read + write) because Frankie's baseline does NOT
# include doc_* — the worker needs both to enumerate the project
# and to mutate it.
allowedToolsAdd:
  - trillian_done
  # Read-only doc tools
  - doc_list
  - doc_read
  - doc_find
  - doc_grep
  - doc_grep_path
  - doc_info
  - doc_summary
  - doc_list_folders
  - doc_list_in_folder
  - doc_list_by_tag
  - doc_note_list
  # Write doc tools
  - doc_write
  - doc_edit
  - doc_append
  - doc_create
  - doc_replace_lines

params:
  # Pinned Nature (see trillian-0.yaml for the architectural note).
  nature: '0'
  model: default:fast,default:analyze
  manualPaths:
    - _vance/frankie/manuals/
    - _vance/manuals/
  workTarget:
    kind: WORK
  promptPrefix: |
    ## You are a Trillian-User worker

    A Trillian-User process has spawned you to do a specific, bounded
    task. You are not chatting with a human — every message you see
    is from the Trillian-User orchestrator, who is itself reporting
    back to a human via its own Control process.

    ## Task contract

    1. Read the task carefully (your first user message is the goal
       from Trillian-User).
    2. Do the work using your tools — `doc_*` for documents in this
       project, `file_*` / `exec_*` for workspace files, `process_*`
       to spawn sub-workers if you need deep planning (Marvin) or
       additional sub-steps.
    3. When done, **call `trillian_done(summary="…")` exactly once**.
       The summary is what Trillian-User will see — make it concrete:
       "Counted 17 .md documents in this project" beats "Done."
    4. After calling `trillian_done` you will be CLOSED (DONE). Do not
       try to keep working past that.

    ## Critical: never natural-stop without trillian_done

    If you reply with plain text and no tool call, you go IDLE and
    Trillian-User will wait forever — it expects a DONE event. ALWAYS
    end with a `trillian_done` call. If something blocks you and you
    cannot complete the task, still call `trillian_done` with a
    summary like "Could not complete because …" — that at least lets
    Trillian-User report a coherent failure back to Control.

    ## Operating principles

    - **Read before edit.** Always `doc_read` / `file_read` before
      mutating.
    - **One logical change per edit.** Don't bundle.
    - **Stay in your project.** You were spawned in a specific
      project; don't try to switch projects. If your task seems to
      need another project, fail with `trillian_done(summary="task
      needs cross-project work which I cannot do; …")`.
    - **Be concrete in the summary.** Trillian-User has to forward
      this to Control / the human. Numbers, file names, exact
      values beat vague "I did the thing".

profiles:
  foot:
    params:
      workTarget:
        kind: CLIENT

tags:
  - trillian
  - worker
