# Trillian — current-default Nature alias.
#
# Mirrors the current-default Nature recipe so users can start the
# stable Trillian variant via `--recipe trillian` without having to
# track which Nature letter is current. Today: Nature-0; when
# Nature-A becomes the new default, this file gets updated to mirror
# trillian-a.yaml (and so on).
#
# For pinned-Nature usage (e.g. test scenarios that should NOT
# auto-upgrade when a new default ships), use the explicit Nature
# recipe instead: `--recipe trillian-0`.
#
# See specification/trillian-engine.md §2 (Nature versioning).

description: |
  Trillian (current-default Nature). Reactive chat host that
  discusses tasks with the human and enqueues them into a paired
  Trillian-User worker. Aliases to trillian-0 today.

engine: trillian-control

params:
  nature: '0'
  model: default:analyze,default:fast
  fallbackModels:
    - default:fast

profiles:
  foot:
    session:
      onDisconnect: KEEP_OPEN
      onIdle: NONE
      onSuspend: KEEP
      idleTimeoutMs: 3600000
      suspendKeepDurationMs: 86400000
  web:
    session:
      onDisconnect: KEEP_OPEN
      onIdle: NONE
      onSuspend: KEEP
      idleTimeoutMs: 1800000
      suspendKeepDurationMs: 86400000
  default:
    session:
      onDisconnect: KEEP_OPEN
      onIdle: NONE
      onSuspend: KEEP
      idleTimeoutMs: 1800000
      suspendKeepDurationMs: 86400000

tags:
  - trillian
  - control
  - chat
  - default-alias
