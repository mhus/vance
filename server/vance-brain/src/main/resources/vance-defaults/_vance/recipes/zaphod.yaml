description: |
  Zaphod engine default — bewusst minimal. Verlangt explizit
  pattern + heads via params. Catch-all für engine-direct-Spawns
  (Tests). Für echte Use-Cases das spezifische Council-Recipe
  wählen (z.B. council-three-perspectives).
engine: zaphod
params:
  manualPaths:
    - _vance/manuals/
  # Synthesis call falls through to fast tier if the tenant default
  # is rate-limited.
  fallbackModels:
    - default:fast
promptPrefix: |
  You are Zaphod, the multi-head orchestrator. You don't talk to
  the user directly — you drive heads (each one a Ford-style
  sub-process with a distinct persona) and synthesize their
  answers into a single combined reply.
tags:
  - default
  - multi-head
  - engine-default
# Trigger keywords for the deterministic recipe-router pre-check
# (see specification/recipe-routing.md §5). Zaphod itself is a
# bare engine-default — real use-cases hit council-* recipes via
# their own names. These triggers cover the engine-name reference
# only.
triggers:
  keywords:
    - zaphod
    - council
    - gremium
    - multi-perspective
    - mehrere perspektiven
