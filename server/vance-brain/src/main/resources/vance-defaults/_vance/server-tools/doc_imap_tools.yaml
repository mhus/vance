type: doc_lookup
description: >
  How to wire an `imap_mailbox` server-tool — IMAP access with auth in
  project- or user-settings. Covers credential scope (per-project vs
  per-user), STARTTLS vs implicit-TLS choice, the read sub-tools the
  factory always emits (list_folders, list_messages, get_message), the
  opt-in write sub-tools triggered by `readonly: false` (set_seen,
  set_flagged, move_message, delete_message with soft/hard mode), and
  the recipe for scheduler-driven polling.
