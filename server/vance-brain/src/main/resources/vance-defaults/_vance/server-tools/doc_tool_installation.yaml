type: doc_lookup
description: >
  How to install Vance tool integrations (Atlassian, IMAP, SMTP, Slack,
  …) from the tenant's tool-template catalog. Covers the three template
  tools (tool_template_list / describe / apply), multi-select feature
  pickers (e.g. atlassian → Jira and/or Confluence), how to choose the
  target project, how to handle PASSWORD inputs safely, re-apply with a
  different feature selection, and the post-install hook flow (e.g.
  "now open Connected Accounts and click Connect Atlassian"). Read this
  when the user says any of "richte mir X ein", "set up X", "verbinde
  Vance mit X".
parameters:
  path: manuals/tool-installation.md
enabled: true
primary: false
labels: [docs, tool-template, install]
