title:
  de: "Research — Such-Provider"
  en: "Research — Search Providers"
description:
  de: "Konfiguriert die Web-/Research-Such-Endpoints (Zarniwoop). Werte werden
       tenant-weit geschrieben (`_tenant`) und gelten dadurch für alle Projekte
       — auch System-Projekte wie `_user_*`. Pro Endpoint: aktivieren und (falls
       nötig) API-Key hinterlegen. Das Default-Routing pro Modality bestimmt
       der Dispatcher automatisch aus den aktivierten Endpoints."
  en: "Configures the web/research search endpoints (Zarniwoop). Values are
       written tenant-wide (`_tenant`) and apply to all projects including
       system projects like `_user_*`. Per endpoint: enable and (if required)
       provide the API key. Default routing per modality is picked
       automatically by the dispatcher from the enabled endpoints."
icon: magnifying-glass
category: ai
defaultScope: tenant

fields:

  # ─── Serper.dev — Web / Image / Video / PDF ──────────────────────

  # Default `true` matches the dispatcher's behavior when `.enabled`
  # is missing in Mongo (ZarniwoopGateService treats absent as enabled).
  # If this default were `false`, opening + saving the form on an
  # endpoint configured via init-settings would silently disable it.

  - name: serperEnabled
    type: boolean
    defaultValue: "true"
    label:
      de: "Serper.dev aktivieren"
      en: "Enable Serper.dev"
    help:
      de: "Kommerzieller Google-SERP-API-Provider — bedient WEB, IMAGE, VIDEO,
           PDF aus einer einzigen API-Key. Free-Tier 2 500 Calls/Monat
           (siehe https://serper.dev/billing)."
      en: "Commercial Google SERP API — serves WEB, IMAGE, VIDEO, PDF from one
           single API key. Free tier 2 500 calls/month
           (see https://serper.dev/billing)."
    bindsTo:
      key: "research.endpoint.serper-main.enabled"

  - name: serperApiKey
    type: password
    label:
      de: "Serper API-Key"
      en: "Serper API Key"
    help:
      de: "Leer lassen, um einen bereits gespeicherten Key unverändert zu
           übernehmen. Beim Deaktivieren wird der Key gelöscht."
      en: "Leave empty to keep an already stored key. Disabling Serper deletes
           the stored key."
    showIf:  "serperEnabled"
    writeIf: "serperEnabled"
    bindsTo:
      key: "research.endpoint.serper-main.apiKey"

  - name: serperBaseUrl
    type: string
    label:
      de: "Serper Base-URL (optional)"
      en: "Serper Base-URL (optional)"
    help:
      de: "Leer = https://google.serper.dev (Standard). Nur überschreiben für
           private Mirrors oder Region-spezifische Endpoints."
      en: "Empty = https://google.serper.dev (default). Override only for
           private mirrors or region-specific endpoints."
    showIf:  "serperEnabled"
    writeIf: "serperEnabled"
    bindsTo:
      key: "research.endpoint.serper-main.baseUrl"

  # ─── Wikipedia — Encyclopedia + Web-Fallback (keyless) ───────────

  - name: wikiEnabled
    type: boolean
    defaultValue: "true"
    label:
      de: "Wikipedia aktivieren"
      en: "Enable Wikipedia"
    help:
      de: "Key-loser Encyclopedia-Provider. Bedient ENCYCLOPEDIA und springt
           zusätzlich als WEB-Fallback ein, wenn keine andere WEB-Quelle
           verfügbar ist."
      en: "Key-less encyclopedia provider. Serves ENCYCLOPEDIA and additionally
           acts as a WEB fallback when no other WEB source is available."
    bindsTo:
      key: "research.endpoint.wiki-de.enabled"

  - name: wikiBaseUrl
    type: string
    label:
      de: "Wikipedia Base-URL (optional)"
      en: "Wikipedia Base-URL (optional)"
    help:
      de: "Leer = https://de.wikipedia.org (deutsche Wikipedia). Beispiel für
           Englisch: https://en.wikipedia.org. Pro Tenant nur eine Sprache —
           für mehrere Sprachen weitere Endpoints via Raw-Settings anlegen."
      en: "Empty = https://de.wikipedia.org (German Wikipedia). Example for
           English: https://en.wikipedia.org. One language per tenant — add
           additional endpoints via raw settings for multilingual setups."
    showIf:  "wikiEnabled"
    writeIf: "wikiEnabled"
    bindsTo:
      key: "research.endpoint.wiki-de.baseUrl"

  # ─── OpenAlex — Academic (keyless, Polite-Pool via E-Mail) ───────

  - name: openalexEnabled
    type: boolean
    defaultValue: "true"
    label:
      de: "OpenAlex aktivieren"
      en: "Enable OpenAlex"
    help:
      de: "Key-loser akademischer Provider mit über 250 Mio Papers. Der
           Polite-Pool (geringere Latenz, höhere Stabilität) wird durch eine
           Kontakt-E-Mail aktiviert (siehe unten)."
      en: "Key-less academic provider with 250M+ papers. The polite pool
           (lower latency, higher reliability) is activated by providing a
           contact email (see below)."
    bindsTo:
      key: "research.endpoint.openalex.enabled"

  - name: openalexContactEmail
    type: string
    label:
      de: "OpenAlex Polite-Pool E-Mail"
      en: "OpenAlex polite-pool email"
    help:
      de: "Optional. Eine echte E-Mail-Adresse aktiviert den OpenAlex-
           Polite-Pool. Leer = öffentlicher Pool (höhere Latenz, mehr
           Rate-Limit-Risiko)."
      en: "Optional. A real email address activates OpenAlex's polite pool.
           Empty = public pool (higher latency, more rate-limit risk)."
    showIf:  "openalexEnabled"
    writeIf: "openalexEnabled"
    bindsTo:
      key: "research.endpoint.openalex.contactEmail"

  - name: openalexBaseUrl
    type: string
    label:
      de: "OpenAlex Base-URL (optional)"
      en: "OpenAlex Base-URL (optional)"
    help:
      de: "Leer = https://api.openalex.org (Standard). Nur überschreiben für
           private Mirrors oder On-Premise-Snapshots."
      en: "Empty = https://api.openalex.org (default). Override only for
           private mirrors or on-prem snapshots."
    showIf:  "openalexEnabled"
    writeIf: "openalexEnabled"
    bindsTo:
      key: "research.endpoint.openalex.baseUrl"

  # ─── arXiv — STEM-Academic (keyless) ─────────────────────────────

  - name: arxivEnabled
    type: boolean
    defaultValue: "true"
    label:
      de: "arXiv aktivieren"
      en: "Enable arXiv"
    help:
      de: "Key-loser STEM-Academic-Provider. Geeignet als ACADEMIC-Fallback —
           dispatcht automatisch nach OpenAlex, wenn beides aktiv ist."
      en: "Key-less STEM academic provider. Useful as ACADEMIC fallback —
           automatically dispatched after OpenAlex if both are enabled."
    bindsTo:
      key: "research.endpoint.arxiv.enabled"

  - name: arxivBaseUrl
    type: string
    label:
      de: "arXiv Base-URL (optional)"
      en: "arXiv Base-URL (optional)"
    help:
      de: "Leer = https://export.arxiv.org/api (Standard). Nur überschreiben
           für Mirror-Endpoints."
      en: "Empty = https://export.arxiv.org/api (default). Override only for
           mirror endpoints."
    showIf:  "arxivEnabled"
    writeIf: "arxivEnabled"
    bindsTo:
      key: "research.endpoint.arxiv.baseUrl"

  # ─── PubMed / NCBI E-utilities — Biomedical-Academic (keyless) ──

  - name: pubmedEnabled
    type: boolean
    defaultValue: "true"
    label:
      de: "PubMed aktivieren"
      en: "Enable PubMed"
    help:
      de: "Key-loser biomedizinischer Provider (NCBI E-utilities, ~37 Mio
           MEDLINE-Zitate). Ergänzt OpenAlex/arXiv für Life-Sciences /
           Klinik / Pharma. Rate-Limit 3 req/s ohne, 10 req/s mit API-Key."
      en: "Key-less biomedical provider (NCBI E-utilities, ~37M MEDLINE
           citations). Complements OpenAlex/arXiv for life sciences /
           clinical / pharma. Rate-limit 3 req/s without, 10 req/s with
           API key."
    bindsTo:
      key: "research.endpoint.pubmed.enabled"

  - name: pubmedContactEmail
    type: string
    label:
      de: "PubMed Kontakt-E-Mail"
      en: "PubMed contact email"
    help:
      de: "NCBI bittet ausdrücklich um eine Kontakt-E-Mail bei jedem
           Aufruf (Etikette). Bei Rate-Limit-Verletzung benachrichtigt
           NCBI diese Adresse vor dem Block. Leer = keine Adresse
           mitgesendet."
      en: "NCBI explicitly asks for a contact email on every call
           (etiquette). On rate-limit violation NCBI notifies this
           address before blocking. Empty = no address sent."
    showIf:  "pubmedEnabled"
    writeIf: "pubmedEnabled"
    bindsTo:
      key: "research.endpoint.pubmed.contactEmail"

  - name: pubmedApiKey
    type: password
    label:
      de: "PubMed API-Key (optional)"
      en: "PubMed API key (optional)"
    help:
      de: "Optional. Mit API-Key 10 req/sec statt 3 req/sec. Kostenlos
           über ein NCBI-Konto erhältlich
           (https://www.ncbi.nlm.nih.gov/account/settings/)."
      en: "Optional. With API key, rate is 10 req/sec instead of 3.
           Free via an NCBI account
           (https://www.ncbi.nlm.nih.gov/account/settings/)."
    showIf:  "pubmedEnabled"
    writeIf: "pubmedEnabled"
    bindsTo:
      key: "research.endpoint.pubmed.apiKey"

  - name: pubmedBaseUrl
    type: string
    label:
      de: "PubMed Base-URL (optional)"
      en: "PubMed Base-URL (optional)"
    help:
      de: "Leer = https://eutils.ncbi.nlm.nih.gov/entrez/eutils (Standard).
           Nur überschreiben für lokale E-utilities-Spiegel."
      en: "Empty = https://eutils.ncbi.nlm.nih.gov/entrez/eutils (default).
           Override only for local E-utilities mirrors."
    showIf:  "pubmedEnabled"
    writeIf: "pubmedEnabled"
    bindsTo:
      key: "research.endpoint.pubmed.baseUrl"

  # ─── OpenLibrary — Books (keyless) ───────────────────────────────

  - name: openlibEnabled
    type: boolean
    defaultValue: "true"
    label:
      de: "OpenLibrary aktivieren"
      en: "Enable OpenLibrary"
    help:
      de: "Key-loser Buch-Provider (Internet Archive). Bedient BOOK."
      en: "Key-less book provider (Internet Archive). Serves BOOK."
    bindsTo:
      key: "research.endpoint.openlib.enabled"

  - name: openlibBaseUrl
    type: string
    label:
      de: "OpenLibrary Base-URL (optional)"
      en: "OpenLibrary Base-URL (optional)"
    help:
      de: "Leer = https://openlibrary.org (Standard). Nur überschreiben für
           Mirror- oder Archive-Snapshots."
      en: "Empty = https://openlibrary.org (default). Override only for
           mirror or archive snapshots."
    showIf:  "openlibEnabled"
    writeIf: "openlibEnabled"
    bindsTo:
      key: "research.endpoint.openlib.baseUrl"

  # ─── HackerNews via Algolia — Tech-News (keyless) ────────────────

  - name: hnEnabled
    type: boolean
    defaultValue: "true"
    label:
      de: "HackerNews aktivieren"
      en: "Enable HackerNews"
    help:
      de: "Key-loser Tech-News-Provider via Algolia. Bedient NEWS und liefert
           als sekundärer Treffer auch WEB (tech-fokussiert)."
      en: "Key-less tech-news provider via Algolia. Serves NEWS and also
           contributes secondary WEB hits (tech-focused)."
    bindsTo:
      key: "research.endpoint.hn-algolia.enabled"

  - name: hnBaseUrl
    type: string
    label:
      de: "HackerNews Base-URL (optional)"
      en: "HackerNews Base-URL (optional)"
    help:
      de: "Leer = https://hn.algolia.com/api/v1 (Standard). Nur überschreiben
           für Algolia-Mirror-Endpoints."
      en: "Empty = https://hn.algolia.com/api/v1 (default). Override only for
           Algolia mirror endpoints."
    showIf:  "hnEnabled"
    writeIf: "hnEnabled"
    bindsTo:
      key: "research.endpoint.hn-algolia.baseUrl"

settings:

  # Protocol pinning per endpoint. Without `.protocol` the
  # SearchProviderFactory skips the endpoint entirely — so deleting
  # `.protocol` (via writeIf) is what makes a disabled endpoint
  # disappear from `research_providers`. The `.enabled` setting
  # remains as the toggle state but has no effect once the endpoint
  # is not instantiated.

  - key: "research.endpoint.serper-main.protocol"
    settingType: STRING
    writeIf: "serperEnabled"
    value: "serper"

  - key: "research.endpoint.wiki-de.protocol"
    settingType: STRING
    writeIf: "wikiEnabled"
    value: "wikipedia"

  - key: "research.endpoint.openalex.protocol"
    settingType: STRING
    writeIf: "openalexEnabled"
    value: "openalex"

  - key: "research.endpoint.arxiv.protocol"
    settingType: STRING
    writeIf: "arxivEnabled"
    value: "arxiv"

  - key: "research.endpoint.pubmed.protocol"
    settingType: STRING
    writeIf: "pubmedEnabled"
    value: "pubmed"

  - key: "research.endpoint.openlib.protocol"
    settingType: STRING
    writeIf: "openlibEnabled"
    value: "openlibrary"

  - key: "research.endpoint.hn-algolia.protocol"
    settingType: STRING
    writeIf: "hnEnabled"
    value: "hackernews"
