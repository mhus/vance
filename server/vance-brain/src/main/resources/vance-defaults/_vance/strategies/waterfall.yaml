# Waterfall strategy — sequential plan → implement → review with
# user-approval gates.
#
# Loaded via the document cascade (project → _vance → classpath:
# vance-defaults/strategies/). Tenants override by placing a file at
# strategies/waterfall.yaml inside their _vance project.
#
# Variable substitution (${params.X}, ${state.X}, ${phases.X.…}) is
# applied by VogonEngine when reading worker / workerInput /
# checkpoint.message — keep these as templates, not pre-rendered text.
#
# See specification/vogon-engine.md for the full schema and primitives.

name: waterfall
description: |
  Sequential plan: planning → implementation → review. User
  approval gates between phases. Default workers are configurable
  via params.workerRecipes.{planning,implementation,review}.
version: "1"
paramDefaults:
  workerRecipes:
    planning: analyze
    implementation: marvin-worker
    review: code-read
phases:

  - name: planning
    worker: ${params.workerRecipes.planning}
    workerInput: |
      Erstelle einen Plan für: ${params.goal}

      Wenn relevant, gliedere in Schritte und Abhängigkeiten.
    gate:
      requires: [planning_completed]
    checkpoint:
      type: approval
      message: |
        Plan steht für '${params.goal}'. Soll ich mit der Umsetzung
        weitermachen?
      storeAs: plan_approved
      criticality: NORMAL

  - name: implementation
    worker: ${params.workerRecipes.implementation}
    workerInput: |
      Setze den Plan aus Phase planning um.

      Plan-Inhalt:
      ${phases.planning.result}
    gate:
      requires: [implementation_completed]

  - name: review
    worker: ${params.workerRecipes.review}
    workerInput: |
      Reviewe die Umsetzung aus Phase implementation.

      Umsetzungs-Inhalt:
      ${phases.implementation.result}

      Beurteile: ist das Ergebnis vollständig und korrekt?
    gate:
      requires: [review_completed]
    checkpoint:
      type: approval
      message: |
        Review ist da. Akzeptierst du das Ergebnis als final?
      storeAs: review_accepted
      criticality: NORMAL
