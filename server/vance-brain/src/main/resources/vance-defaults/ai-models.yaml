# Token-window metadata for known AI models. Used by ModelCatalog to
# decide when to compact a chat (default trigger: 90% of contextWindow,
# see vance.ford.compactionTriggerRatio), to size the request's
# max-output-tokens, and to gate multimodal attachments.
#
# Bundled defaults — overridable per tenant (document path
# ai-models.yaml in the _vance system project) or per project (same
# path in the project itself). Cascade matches recipes: project →
# _vance → this classpath file. Merge is deep, per <provider>:<modelName>:
# an override only needs to carry the fields it changes; fields not
# listed inherit from the next outer layer. Lists (capabilities) are
# replaced, not concatenated.
#
# Format:
#   <provider>:
#     <modelName>:
#       contextWindowTokens: <int>     # combined input + output budget
#       defaultMaxOutputTokens: <int>  # cap on a single response
#       size: SMALL|LARGE              # capability class — drives
#                                      # prompt-variant selection in recipes
#       capabilities: [vision, pdf]    # optional input modalities; absent
#                                      # / unknown models are treated as
#                                      # text-only (pessimistic default)
#
# Adjust freely; this file is committed (no secrets here).

anthropic:
  claude-sonnet-4-5:
    contextWindowTokens: 200000
    defaultMaxOutputTokens: 8192
    size: LARGE
    capabilities: [vision, pdf]
  claude-opus-4:
    contextWindowTokens: 200000
    defaultMaxOutputTokens: 8192
    size: LARGE
    capabilities: [vision, pdf]
  claude-haiku-4-5:
    contextWindowTokens: 200000
    defaultMaxOutputTokens: 8192
    size: SMALL
    capabilities: [vision, pdf]

gemini:
  gemini-2.5-flash:
    contextWindowTokens: 1048576
    defaultMaxOutputTokens: 8192
    size: SMALL
    capabilities: [vision, pdf]
  gemini-2.5-pro:
    contextWindowTokens: 2097152
    defaultMaxOutputTokens: 8192
    size: LARGE
    capabilities: [vision, pdf]
  gemini-2.0-flash:
    contextWindowTokens: 1048576
    defaultMaxOutputTokens: 8192
    size: SMALL
    # 2.0-flash predates Gemini's PDF document mode; vision works.
    capabilities: [vision]

