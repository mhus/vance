# Reactive session-chat orchestrator. Talks to the user, delegates
# operational work to worker recipes, synthesises worker results back
# into the chat. Default for engine 'arthur' when no specific recipe
# is named.

description: |
  Reactive session-chat orchestrator. Talks to the user, delegates
  operational work to worker recipes, synthesises worker results
  back into the chat. Default for engine 'arthur' when no specific
  recipe is named.
engine: arthur
params:
  model: default:analyze
  validation: true
  maxIterations: 6
  # If the primary alias hits a demand spike or 5xx and exhausts its
  # retry budget, the resilient layer falls through these in order.
  # Aliases that the tenant hasn't configured are silently dropped.
  fallbackModels:
    - default:fast
  # Folder list joined by manual_list / manual_read. Resolved through
  # the document cascade per folder — tenants can drop additional
  # how-tos into <project>/manuals/ or _vance/manuals/ without touching this
  # recipe. Recipe order = precedence on duplicate filenames.
  manualPaths:
    - manuals/
  # Default prompts live in the document cascade — the Arthur engine
  # loads prompts/arthur-prompt.md (project → _vance → classpath:
  # vance-defaults/prompts/) as the engineDefault. Tenants override
  # the prompt by placing a file at the matching path in their _vance
  # project (or per-user in _user_<login>); the small-model variant
  # comes from prompts/arthur-prompt-small.md the same way.
  #
  # Recipes that want a different prompt either set promptPrefix
  # directly here (highest precedence) or point promptDocument /
  # promptDocumentSmall at a different cascade path.
intentCorrection: |
  VALIDATION CHECK: your previous response said you would do
  something ('%s') but emitted no tool call. The user is now
  waiting for an action that will never happen. Pick one and
  emit it now: (a) the corresponding tool call, or (b) a
  direct question to the user without promising future action.
profiles:
  # The foot CLI is the user's terminal on their own machine — local
  # files, shell, and JS run there. Reach them through client_*.
  foot:
    params:
      # Splice the foot-uploaded ./agent.md into the conversation
      # memory block (in addition to the server-side agent doc).
      # See specification/recipes.md §6a.
      useClientAgentDoc: true
    # Lifecycle for foot sessions — engines depend on local client
    # tools, so disconnect must suspend; idle = "user is thinking".
    # See specification/session-lifecycle.md §5.
    session:
      onDisconnect: SUSPEND
      onIdle: NONE
      onSuspend: KEEP
      suspendKeepDurationMs: 86400000   # 24h
    promptPrefixAppend: |
      ## Client context — local CLI

      You are reachable from a foot client — the user's CLI on their
      own machine. The user is editing files locally; reach them
      through `client_file_read` / `client_file_list` /
      `client_file_write` / `client_exec_run`. That is the point of
      the foot client. Do not push the user to upload local files
      into the project workspace when they're already on disk.

  # Browser clients can't host filesystem / shell / JS tools — strip
  # them from the allowed list so the LLM doesn't propose calls that
  # would always fail. See specification/recipes.md §6a.
  web:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    # Lifecycle for web sessions — server tools are enough, so the
    # session keeps running across disconnects; idle eventually parks
    # it. See specification/session-lifecycle.md §5.
    session:
      onDisconnect: KEEP_OPEN
      onIdle: SUSPEND
      onSuspend: KEEP
      idleTimeoutMs: 1800000            # 30 min
      suspendKeepDurationMs: 86400000   # 24h
    promptPrefixAppend: |
      ## Client context — web browser

      You are reachable from a web browser — there is no local
      filesystem on the client side. Use `workspace_read` /
      `workspace_write` for files stored in the project. If the user
      references local files (`~/Documents/foo.md`, paths on their
      machine), explain that you can't reach them from a web client
      and offer alternatives: upload to the workspace, or reconnect
      via `vance` CLI.

  # Catch-all for unknown / future / API-only profiles. Same
  # restrictions as web — no client_* — until the new profile gets
  # an explicit block of its own.
  default:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    session:
      onDisconnect: KEEP_OPEN
      onIdle: SUSPEND
      onSuspend: KEEP
      idleTimeoutMs: 1800000
      suspendKeepDurationMs: 86400000
    promptPrefixAppend: |
      ## Client context — non-CLI client

      You are reachable from a client without local filesystem or
      shell access. Use `workspace_*` tools for project files; do not
      promise `client_*` operations.
tags:
  - chat
  - orchestrator
