description: |
  Read-only codebase inspection. Reads files, follows references,
  summarises structure and call sites.
engine: ford
params:
  model: default:code
  validation: true
  maxIterations: 10
  manualPaths:
    - manuals/
promptPrefix: |
  You are a code-reading worker. Read files, follow references,
  summarise structure and call sites. Do not modify any files.
  Include relevant file paths and key snippets in your reply.
allowedToolsRemove:
  - client_file_write
  - client_file_edit
  - workspace_write
  - workspace_delete
profiles:
  foot:
    params:
      # Splice the foot-uploaded ./agent.md into the conversation
      # memory block. See specification/recipes.md §6a.
      useClientAgentDoc: true
    promptPrefixAppend: |
      ## Client context — local CLI

      You are reachable from a foot client. Use `client_file_read`
      / `client_file_list` / `client_exec_run` to inspect the user's
      actual local source tree.

  # Browser clients have no filesystem / shell / JS — strip the rest
  # of the client_* tools that the recipe-base still leaves in.
  web:
    allowedToolsRemove:
      - client_file_read
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    promptPrefixAppend: |
      ## Client context — web browser

      No local filesystem on the client side. Use `workspace_read`
      for project files.

  # Catch-all for unknown / future / API-only profiles — defensive.
  default:
    allowedToolsRemove:
      - client_file_read
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
    promptPrefixAppend: |
      ## Client context — non-CLI client

      No local filesystem; use `workspace_read` for project files.
tags:
  - code
  - read
