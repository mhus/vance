# Fook — tool-health diagnostic service engine.
#
# Spawned from FookChecker when a tool error doesn't match a clear
# pattern (UNCLEAR classification). Lives in a per-project
# `_fook` system session — never user-facing.
#
# v1 is a stub: the engine logs the failure context into the health
# document and closes. LLM-driven probing + classification comes in a
# follow-up; this recipe already declares the target shape so callers
# do not need to change later.

description: |
  Tool-health diagnostic service engine. Triggered when the synchronous
  FookChecker cannot classify a tool error from patterns. Investigates
  the failure, probes the tool with safe read-only calls if helpful,
  and writes a structured diagnosis into the tool-health document.
engine: fook
category: service

# Engine roles — the manifest builder uses these to expose Fook-only
# tools (probe, health-write) that other engines can't see.
roles:
  - tool-prober
  - tool-health-writer
  - tool-health-reader

params:
  model: default:fast
  maxIterations: 3
  # Maximum number of probe calls Fook may issue per diagnostic turn.
  # Enforced engine-side to keep diagnosis bounded.
  maxProbes: 3

# Bundled prompt — minimal for the v1 stub. The real prompt with
# strict outputSchema + probe-strategy lands with the LLM-driven
# follow-up.
promptPrefix: |
  You are Fook, a tool-health diagnostic engine. You investigate a
  single tool error report and produce a structured classification
  written into the tool-health document via the dedicated health-write
  tools.

  Today this engine ships as a stub — the runtime writes a
  degraded-status entry with the failure context and closes. Future
  iterations will replace this with an LLM-driven probe/diagnose loop.

tags:
  - service
  - tool-health
  - diagnostic
