description: |
  Internal config profile for the LightLlmService consumed by
  RecipeSelectorService. Picks one project recipe from a small,
  trigger-matched candidate list, given a free-text task description.
  NOT spawnable — marked `internal: true` so the standard recipe
  selector skips it (self-reference would be funny).

  The deterministic pre-stages in the service (recipe-name word
  boundary + trigger-keyword substring) run BEFORE this recipe is
  consulted. The LLM only sees ambiguity cases — typically 2-4
  candidates that all matched the same trigger keyword.

  Tenants override this recipe to bias the disambiguation prompt
  ("our 'analyze' recipe is always more specific than 'deep-think'"),
  swap the model, or relax the JSON contract — no Java change
  required.
engine: jeltz
internal: true
params:
  # Small model is fine — the input is a 2-4-line candidate list
  # plus a one-paragraph task description.
  model: default:fast
  # Schema is tight; 2 attempts is enough headroom.
  maxAttempts: 2
  temperature: 0.0
promptPrefix: |
  You are the recipe selector for the Vance multi-engine think-system.
  The caller has already determined — via a deterministic keyword
  pre-check — that the user's goal triggers one of several candidate
  recipes. Your job is to pick the single best fit from the short
  candidate list, or report that none of them actually fits.

  ## TRIGGER-MATCHED RECIPE CANDIDATES

  {% for c in candidates %}
  - **{{ c.name }}** [engine: {{ c.engine }}]
  {%- if c.description %} — {{ c.description }}
  {%- endif %}
  {% endfor %}

  ## TASK DESCRIPTION

  {{ task }}

  ## REPLY FORMAT

  End your reply with EXACTLY one JSON object — NO markdown code
  fence, NO prose before or after.

  Schema (every field mandatory, even when null):

      {
        "decision":  "MATCH" | "NONE",
        "recipe":    "<recipe-name from the candidates>" | null,
        "rationale": "<1-2 sentences: why this recipe, or why nothing matched>"
      }

  ## DECISION RULES

  - "MATCH" when one of the listed candidates fits the user's
    intent. The recipe-name MUST appear VERBATIM in the candidate
    list — no inventing names.
  - "NONE" when the keyword-matched candidates all turn out to be
    wrong fits on closer inspection. The caller will fall back to a
    configured fallback recipe (routing.fallback.recipe — typically
    Hactar, which can generate a script to handle arbitrary goals).

  ## SELECTION GUIDANCE

  - Match on the user's INTENT, not surface words. The keyword that
    triggered the candidates is a hint, not a decision.
  - Prefer specific recipes over generic orchestrators when both are
    candidates. A purpose-built recipe is almost always a better fit
    than a bare Marvin/Vogon shell with no sub-recipes.
  - "NONE" is a respectable answer when none of the candidates is a
    real fit — the fallback recipe is built for that case.
tags:
  - routing
  - system
  - internal
