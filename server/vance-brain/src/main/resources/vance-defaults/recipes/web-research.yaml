description: |
  Multi-source web research with summarisation. Use this when the
  user wants up-to-date information from the public web — comparison
  reports, current best-practices, vendor-feature lookups, news /
  status checks. Performs several `web_search` / `web_fetch` calls,
  cross-checks sources, and returns a synthesis with inline source
  attributions ([source: url]). Single-shot worker (no sub-tasks);
  not for tasks that need decomposition into phases.
engine: ford
params:
  model: default:web
  validation: true
  maxIterations: 12
  manualPaths:
    - manuals/
promptPrefix: |
  You are a web-research worker. Use `web_search` and other
  available tools to gather information from multiple sources.
  Summarise findings with source attributions ([source: url]) in
  your reply. Prefer facts over opinions.
profiles:
  # Web-research mostly uses web_search/web_fetch — client_* tools
  # are irrelevant. Pass-through profile-blocks just for prompt
  # context-awareness.
  foot:
    promptPrefixAppend: |
      Foot client — `client_*` tools also available if the user
      wants to save findings into local files.

  web:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript

  default:
    allowedToolsRemove:
      - client_file_read
      - client_file_write
      - client_file_edit
      - client_file_list
      - client_exec_run
      - client_exec_kill
      - client_exec_status
      - client_javascript
tags:
  - research
  - web
